<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- dark navy background -->
  <rect width="32" height="32" rx="5" fill="#1c2e4a"/>
  <!-- thin column labels -->
  <rect x="5"  y="4" width="8" height="1.5" rx=".75" fill="#2d5f8a"/>
  <rect x="19" y="4" width="8" height="1.5" rx=".75" fill="#2d5f8a"/>
  <!-- centre divider -->
  <rect x="15" y="6" width="2" height="22" rx="1" fill="#253d5c"/>
  <!-- DI dots — left column, green -->
  <circle cx="9"  cy="10" r="3" fill="#2d7d46"/>
  <circle cx="9"  cy="16" r="3" fill="#2d7d46"/>
  <circle cx="9"  cy="22" r="3" fill="#2d7d46"/>
  <circle cx="9"  cy="28" r="3" fill="#4a4a4a"/>
  <!-- DO dots — right column, blue -->
  <circle cx="23" cy="10" r="3" fill="#1a73e8"/>
  <circle cx="23" cy="16" r="3" fill="#4a4a4a"/>
  <circle cx="23" cy="22" r="3" fill="#1a73e8"/>
  <circle cx="23" cy="28" r="3" fill="#1a73e8"/>
</svg>
