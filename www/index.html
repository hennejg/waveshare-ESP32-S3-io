<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Device Configuration</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 560px; margin: 2rem auto; padding: 0 1rem; color: #222; }
    h1 { font-size: 1.4rem; margin-bottom: 1.5rem; }
    label { display: block; margin-top: 1.2rem; font-size: 0.85rem; font-weight: 600; color: #555; }
    input[type="text"], input[type="number"] {
      width: 100%; margin-top: 0.3rem; padding: 0.5rem 0.6rem;
      border: 1px solid #ccc; border-radius: 4px; font-size: 1rem;
    }
    button {
      margin-top: 1.8rem; padding: 0.6rem 1.6rem;
      background: #1a73e8; color: #fff; border: none; border-radius: 4px;
      font-size: 1rem; cursor: pointer;
    }
    button:disabled { background: #aaa; cursor: default; }
    #status { margin-top: 0.8rem; font-size: 0.9rem; min-height: 1.2em; }
    .ok  { color: #2d7d46; }
    .err { color: #c0392b; }
  </style>
</head>
<body>
  <h1>Device Configuration</h1>
  <form id="form">
    <label>Device Name
      <input type="text" id="device_name" maxlength="31" required>
    </label>
    <!-- Add further fields here; mirror them in app_config.h and the REST handlers -->
    <button type="submit" id="btn">Save</button>
  </form>
  <p id="status"></p>

  <script>
    const status = document.getElementById('status');
    const btn    = document.getElementById('btn');

    async function load() {
      try {
        const r = await fetch('/api/config');
        if (!r.ok) throw new Error(r.status);
        const cfg = await r.json();
        document.getElementById('device_name').value = cfg.device_name ?? '';
      } catch (e) {
        status.className = 'err';
        status.textContent = 'Failed to load config: ' + e.message;
      }
    }

    document.getElementById('form').addEventListener('submit', async e => {
      e.preventDefault();
      btn.disabled = true;
      status.textContent = '';
      try {
        const cfg = {
          device_name: document.getElementById('device_name').value.trim(),
        };
        const r = await fetch('/api/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(cfg),
        });
        const res = await r.json();
        status.className = res.status === 'ok' ? 'ok' : 'err';
        status.textContent = res.status === 'ok' ? 'Saved.' : 'Error: ' + JSON.stringify(res);
      } catch (e) {
        status.className = 'err';
        status.textContent = 'Save failed: ' + e.message;
      } finally {
        btn.disabled = false;
      }
    });

    load();
  </script>
</body>
</html>
