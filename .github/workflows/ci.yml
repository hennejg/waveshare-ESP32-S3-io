name: CI

on:
  pull_request:
    branches: [master, main]

jobs:
  build:
    name: Build firmware
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.4   # must match esp-idf submodule version

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false   # skip the large esp-idf submodule; use container's IDF

      - name: Fix git safe directory (Docker container runs as root)
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      # Only QuickJS is required (the rule engine); esp-idf comes from the container
      # and esp-matter is optional (Matter is disabled when its submodule is absent).
      - name: Check out the QuickJS submodule
        run: |
          git config --global --add safe.directory '*'
          git submodule update --init components/quickjs/extern/quickjs

      - name: Cache managed components
        uses: actions/cache@v5
        with:
          path: managed_components
          key: managed-${{ hashFiles('main/idf_component.yml') }}
          restore-keys: managed-

      - name: Build
        run: |
          . "$IDF_PATH/export.sh"
          idf.py set-target esp32s3
          idf.py build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: firmware-${{ github.sha }}
          retention-days: 7
          path: |
            build/waveshare_esp32s3.bin
            build/storage.bin
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
            build/flash_args

  rule-engine-tests:
    name: Rule engine tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false   # the DSL test suite is self-contained (no submodules)

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Zero-dependency suite (Node's built-in test runner) — no install step needed.
      - name: Run the DSL test suite
        working-directory: components/scripting
        run: npm test
