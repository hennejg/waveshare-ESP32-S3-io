name: CI

on:
  pull_request:
    branches: [master, main]

jobs:
  build-full:
    name: Build firmware (full)
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.4   # must match esp-idf submodule version

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false   # skip the large esp-idf submodule; use container's IDF

      - name: Fix git safe directory (Docker container runs as root)
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      # Only QuickJS is required (the rule engine); esp-idf comes from the container.
      - name: Check out the QuickJS submodule
        run: |
          git config --global --add safe.directory '*'
          git submodule update --init components/quickjs/extern/quickjs

      - name: Cache managed components
        uses: actions/cache@v5
        with:
          path: apps/full/managed_components
          key: managed-full-${{ hashFiles('apps/full/main/idf_component.yml', 'components/board/idf_component.yml') }}
          restore-keys: managed-full-

      - name: Build
        run: |
          . "$IDF_PATH/export.sh"
          idf.py -C apps/full set-target esp32s3
          idf.py -C apps/full build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: firmware-full-${{ github.sha }}
          retention-days: 7
          path: |
            apps/full/build/waveshare_esp32s3_full.bin
            apps/full/build/storage.bin
            apps/full/build/bootloader/bootloader.bin
            apps/full/build/partition_table/partition-table.bin
            apps/full/build/flash_args

  build-matter:
    name: Build firmware (matter)
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.4   # must match esp-idf submodule version

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Fix git safe directory (Docker container runs as root)
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global --add safe.directory '*'

      - name: Get esp-matter submodule commit (for cache key)
        id: matter-sha
        run: echo "sha=$(git ls-files -s esp-matter | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache esp-matter submodule
        id: cache-matter
        uses: actions/cache@v5
        with:
          path: esp-matter
          key: esp-matter-${{ steps.matter-sha.outputs.sha }}

      - name: Initialize and bootstrap esp-matter
        if: steps.cache-matter.outputs.cache-hit != 'true'
        run: |
          git submodule update --init --recursive --depth 1 esp-matter
          # cffi 1.15.0 (pinned by Pigweed) has no cp312 wheels and uses C APIs
          # removed in Python 3.12. Patch any pinned constraint to 1.16+ before
          # running install.sh so pip can download a pre-built wheel instead.
          grep -rl "cffi==1\.15\." esp-matter | xargs -r sed -i 's/cffi==1\.15\.[0-9]*/cffi>=1.16.0/g'
          ./esp-matter/install.sh

      - name: Cache managed components (matter)
        uses: actions/cache@v5
        with:
          path: apps/matter/managed_components
          key: managed-matter-${{ hashFiles('apps/matter/main/idf_component.yml', 'components/board/idf_component.yml') }}
          restore-keys: managed-matter-

      - name: Build
        run: |
          . "$IDF_PATH/export.sh"
          . ./esp-matter/export.sh
          idf.py -C apps/matter set-target esp32s3
          idf.py -C apps/matter build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: firmware-matter-${{ github.sha }}
          retention-days: 7
          path: |
            apps/matter/build/waveshare_esp32s3_matter.bin
            apps/matter/build/bootloader/bootloader.bin
            apps/matter/build/partition_table/partition-table.bin
            apps/matter/build/flash_args

  rule-engine-tests:
    name: Rule engine tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false   # the DSL test suite is self-contained (no submodules)

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Zero-dependency suite (Node's built-in test runner) — no install step needed.
      - name: Run the DSL test suite
        working-directory: components/scripting
        run: npm test
