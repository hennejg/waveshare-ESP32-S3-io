name: CD

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**.md'
      - '.claude/**'
      - 'docs/**'

concurrency: single

permissions:
  contents: write

jobs:
  tag:
    name: Bump version
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute & push next patch tag
        id: version
        run: |
          git fetch --tags
          LATEST=$(git tag --list 'v*' --sort=-version:refname | head -1)
          if [ -z "$LATEST" ]; then
            NEXT="v1.0.0"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"
            NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$NEXT"
          git push origin "$NEXT"
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"

  build-full:
    name: Build full firmware
    needs: tag
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.4   # must match esp-idf submodule version

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Fix git safe directory (Docker container runs as root)
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Check out the QuickJS submodule
        run: |
          git config --global --add safe.directory '*'
          git submodule update --init components/quickjs/extern/quickjs

      - name: Cache managed components
        uses: actions/cache@v5
        with:
          path: apps/full/managed_components
          key: managed-full-${{ hashFiles('apps/full/main/idf_component.yml', 'components/board/idf_component.yml') }}
          restore-keys: managed-full-

      - name: Build
        run: |
          . "$IDF_PATH/export.sh"
          idf.py -C apps/full set-target esp32s3
          idf.py -C apps/full build

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts-full
          cp apps/full/build/waveshare_esp32s3_full.bin  artifacts-full/
          cp apps/full/build/storage.bin                  artifacts-full/
          cp apps/full/build/bootloader/bootloader.bin    artifacts-full/bootloader.bin
          cp apps/full/build/partition_table/partition-table.bin artifacts-full/partition-table.bin
          cp apps/full/build/flash_args                   artifacts-full/

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-full
          path: artifacts-full/

  build-matter:
    name: Build matter firmware
    needs: tag
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.4   # must match esp-idf submodule version

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Fix git safe directory (Docker container runs as root)
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global --add safe.directory '*'

      - name: Get esp-matter submodule commit (for cache key)
        id: matter-sha
        run: echo "sha=$(git ls-files -s esp-matter | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache esp-matter submodule
        id: cache-matter
        uses: actions/cache@v5
        with:
          path: esp-matter
          key: esp-matter-${{ steps.matter-sha.outputs.sha }}

      - name: Initialize and bootstrap esp-matter
        if: steps.cache-matter.outputs.cache-hit != 'true'
        run: |
          # python3-dev: Pigweed builds several C-extension wheels (bitarray etc.)
          #   that need Python.h; the IDF container ships the runtime only.
          # cffi patch: cffi==1.15.0 pinned by Pigweed has no cp312 wheel and
          #   uses C APIs removed in Python 3.12 — bump to >=1.16.0.
          apt-get update -y -q && apt-get install -y -q --no-install-recommends \
            python3-dev pkg-config libssl-dev libglib2.0-dev libdbus-1-dev \
            libavahi-client-dev ninja-build libgirepository1.0-dev \
            libcairo2-dev libreadline-dev unzip
          git submodule update --init --recursive --depth 1 esp-matter
          grep -rl "cffi==1\.15\." esp-matter | xargs -r sed -i 's/cffi==1\.15\.[0-9]*/cffi>=1.16.0/g'
          ./esp-matter/install.sh

      - name: Cache managed components (matter)
        uses: actions/cache@v5
        with:
          path: apps/matter/managed_components
          key: managed-matter-${{ hashFiles('apps/matter/main/idf_component.yml', 'components/board/idf_component.yml') }}
          restore-keys: managed-matter-

      - name: Build
        run: |
          . "$IDF_PATH/export.sh"
          . ./esp-matter/export.sh
          idf.py -C apps/matter set-target esp32s3
          idf.py -C apps/matter build

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts-matter
          cp apps/matter/build/waveshare_esp32s3_matter.bin  artifacts-matter/
          cp apps/matter/build/bootloader/bootloader.bin      artifacts-matter/bootloader.bin
          cp apps/matter/build/partition_table/partition-table.bin artifacts-matter/partition-table.bin
          cp apps/matter/build/flash_args                     artifacts-matter/

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-matter
          path: artifacts-matter/

  release:
    name: Create GitHub release
    needs: [tag, build-full, build-matter]
    runs-on: ubuntu-latest

    steps:
      - name: Download full firmware artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-full
          path: release-full

      - name: Download matter firmware artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-matter
          path: release-matter

      - name: Install esptool
        run: pip install esptool

      - name: Create merged binaries (ESP Web Tools / single-file flash)
        env:
          TAG: ${{ needs.tag.outputs.new_tag }}
        run: |
          # Full firmware: bootloader + partition-table + app + SPIFFS, offset 0x0
          python -m esptool --chip esp32s3 merge_bin \
            -o "waveshare_esp32s3_full-${TAG}-merged.bin" \
            --flash-mode dio --flash-freq 80m --flash-size 16MB \
            0x0      release-full/bootloader.bin \
            0x8000   release-full/partition-table.bin \
            0x20000  release-full/waveshare_esp32s3_full.bin \
            0x326000 release-full/storage.bin

          # Matter firmware: bootloader + partition-table + app (no SPIFFS)
          python -m esptool --chip esp32s3 merge_bin \
            -o "waveshare_esp32s3_matter-${TAG}-merged.bin" \
            --flash-mode dio --flash-freq 80m --flash-size 16MB \
            0x0     release-matter/bootloader.bin \
            0x8000  release-matter/partition-table.bin \
            0x20000 release-matter/waveshare_esp32s3_matter.bin

      - name: Generate ESP Web Tools manifests
        env:
          TAG: ${{ needs.tag.outputs.new_tag }}
        run: |
          BASE="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/download/${TAG}"
          python3 -c "
          import json, sys
          tag, base = sys.argv[1], sys.argv[2]
          for flavor, name in [('full', 'Full'), ('matter', 'Matter')]:
              obj = {
                  'name': f'Waveshare ESP32-S3 {name} Firmware',
                  'version': tag,
                  'new_install_prompt_erase': False,
                  'builds': [{'chipFamily': 'ESP32-S3', 'parts': [
                      {'path': f'{base}/waveshare_esp32s3_{flavor}-{tag}-merged.bin', 'offset': 0}
                  ]}]
              }
              with open(f'manifest-{flavor}.json', 'w') as f:
                  json.dump(obj, f, indent=2)
          " "${TAG}" "${BASE}"

      - name: Compute ESP Web Tools flash URLs
        id: urls
        env:
          TAG: ${{ needs.tag.outputs.new_tag }}
        run: |
          OWNER="${GITHUB_REPOSITORY%%/*}"
          REPO="${GITHUB_REPOSITORY##*/}"
          BASE="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/download/${TAG}"
          PAGES="https://${OWNER}.github.io/${REPO}"
          echo "flash_full=${PAGES}/flash.html?manifest=${BASE}/manifest-full.json"   >> "$GITHUB_OUTPUT"
          echo "flash_matter=${PAGES}/flash.html?manifest=${BASE}/manifest-matter.json" >> "$GITHUB_OUTPUT"

      - name: Stage remaining release assets
        env:
          TAG: ${{ needs.tag.outputs.new_tag }}
        run: |
          cp release-full/waveshare_esp32s3_full.bin  "waveshare_esp32s3_full-${TAG}.bin"
          cp release-full/storage.bin                  "storage-${TAG}.bin"
          (cd release-full && zip "../waveshare-esp32s3-${TAG}-full-flash.zip" *)

          cp release-matter/waveshare_esp32s3_matter.bin "waveshare_esp32s3_matter-${TAG}.bin"
          (cd release-matter && zip "../waveshare-esp32s3-${TAG}-matter-flash.zip" *)

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.tag.outputs.new_tag }}
          generate_release_notes: true
          files: |
            waveshare_esp32s3_full-*.bin
            storage-*.bin
            waveshare-esp32s3-*-full-flash.zip
            waveshare_esp32s3_full-*-merged.bin
            manifest-full.json
            waveshare_esp32s3_matter-*.bin
            waveshare-esp32s3-*-matter-flash.zip
            waveshare_esp32s3_matter-*-merged.bin
            manifest-matter.json
          body: |
            ## Flash via Browser

            Requires Chrome or Edge with USB access. Connect the device before clicking.

            | Firmware | Browser install | Includes |
            |----------|----------------|---------|
            | **Full** | [Install Full Firmware](${{ steps.urls.outputs.flash_full }}) | Rule engine, MQTT, CAN, Modbus |
            | **Matter** | [Install Matter Firmware](${{ steps.urls.outputs.flash_matter }}) | Apple Home / Google Home |

            ---

            ## Manual flash (esptool)

            ### Full firmware

            Download `waveshare-esp32s3-${{ needs.tag.outputs.new_tag }}-full-flash.zip`, unzip,
            then from inside the extracted folder:

            #### First install (full flash)
            ```sh
            python -m esptool --chip esp32s3 -p /dev/ttyUSBx -b 460800 \
              --before default-reset --after hard-reset \
              write-flash --flash-mode dio --flash-freq 80m --flash-size 16MB \
              @flash_args
            ```

            #### App update only (no web UI changes)
            ```sh
            python -m esptool --chip esp32s3 -p /dev/ttyUSBx -b 460800 \
              --before default-reset --after hard-reset \
              write-flash --flash-mode dio --flash-freq 80m --flash-size 16MB \
              0x20000 waveshare_esp32s3_full-${{ needs.tag.outputs.new_tag }}.bin
            ```

            ---

            ### Matter firmware

            Download `waveshare-esp32s3-${{ needs.tag.outputs.new_tag }}-matter-flash.zip`, unzip,
            then from inside the extracted folder:

            #### First install (full flash)
            ```sh
            python -m esptool --chip esp32s3 -p /dev/ttyUSBx -b 460800 \
              --before default-reset --after hard-reset \
              write-flash --flash-mode dio --flash-freq 80m --flash-size 16MB \
              @flash_args
            ```

            #### App update only
            ```sh
            python -m esptool --chip esp32s3 -p /dev/ttyUSBx -b 460800 \
              --before default-reset --after hard-reset \
              write-flash --flash-mode dio --flash-freq 80m --flash-size 16MB \
              0x20000 waveshare_esp32s3_matter-${{ needs.tag.outputs.new_tag }}.bin
            ```
