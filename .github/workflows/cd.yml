name: CD

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**.md'
      - '.claude/**'
      - 'docs/**'

concurrency: single

permissions:
  contents: write

jobs:
  tag:
    name: Bump version
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute & push next patch tag
        id: version
        run: |
          git fetch --tags
          LATEST=$(git tag --list 'v*' --sort=-version:refname | head -1)
          if [ -z "$LATEST" ]; then
            NEXT="v1.0.0"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"
            NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$NEXT"
          git push origin "$NEXT"
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"

  release:
    name: Build & release
    needs: tag
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.4   # must match esp-idf submodule version

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Fix git safe directory (Docker container runs as root)
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Cache managed components
        uses: actions/cache@v5
        with:
          path: managed_components
          key: managed-${{ hashFiles('main/idf_component.yml') }}
          restore-keys: managed-

      - name: Build
        run: |
          . "$IDF_PATH/export.sh"
          idf.py set-target esp32s3
          idf.py build

      - name: Stage release assets
        env:
          TAG: ${{ needs.tag.outputs.new_tag }}
        run: |
          mkdir release
          cp build/waveshare_esp32s3.bin               "release/waveshare_esp32s3-${TAG}.bin"
          cp build/storage.bin                         "release/storage-${TAG}.bin"
          cp build/bootloader/bootloader.bin           "release/bootloader.bin"
          cp build/partition_table/partition-table.bin "release/partition-table.bin"
          cp build/flash_args                          "release/flash_args"
          (cd release && zip "../waveshare-esp32s3-${TAG}-full-flash.zip" *)

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.tag.outputs.new_tag }}
          generate_release_notes: true
          files: |
            release/waveshare_esp32s3-*.bin
            release/storage-*.bin
            waveshare-esp32s3-*-full-flash.zip
          body: |
            ## Flash instructions

            ### First install (full flash)
            Download `waveshare-esp32s3-${{ needs.tag.outputs.new_tag }}-full-flash.zip`, unzip,
            then from inside the extracted folder:
            ```sh
            python -m esptool --chip esp32s3 -p /dev/ttyUSBx -b 460800 \
              --before default-reset --after hard-reset \
              write-flash --flash-mode dio --flash-freq 80m --flash-size 16MB \
              @flash_args
            ```

            ### App update only (no web UI changes)
            ```sh
            python -m esptool --chip esp32s3 -p /dev/ttyUSBx -b 460800 \
              --before default-reset --after hard-reset \
              write-flash --flash-mode dio --flash-freq 80m --flash-size 16MB \
              0x10000 waveshare_esp32s3-${{ needs.tag.outputs.new_tag }}.bin
            ```
